name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.0"

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Apply Network
        working-directory: terraform/network
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Apply Data
        working-directory: terraform/data
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Apply Compute
        working-directory: terraform/compute
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Apply CICD
        working-directory: terraform/cicd
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Apply Vercel
        working-directory: terraform/vercel
        run: |
          terraform init
          terraform apply -auto-approve
